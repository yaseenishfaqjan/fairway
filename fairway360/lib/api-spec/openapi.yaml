openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Fairway360 multi-tenant SaaS API. All data is scoped to the authenticated user's club; club_id is always derived from the session, never from the request.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: public
  - name: members
  - name: fnb
  - name: employees
  - name: supervisor
  - name: agent

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ---- Auth -----------------------------------------------------------------
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthUser" }
        "401": { $ref: "#/components/responses/Error" }
  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password-reset email
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordInput" }
      responses:
        "200":
          description: Always 200 (does not reveal whether the email exists)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Set a new password using a reset token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordInput" }
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
        "400": { $ref: "#/components/responses/Error" }
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out (clears the session)
      responses:
        "204": { description: Logged out }
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthUser" }
        "401": { $ref: "#/components/responses/Error" }

  # ---- Public ---------------------------------------------------------------
  /leads/demo-request:
    post:
      operationId: createDemoRequest
      tags: [public]
      summary: Submit a demo / sales request from the marketing site
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DemoRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }

  # ---- Members portal -------------------------------------------------------
  /me/dashboard:
    get:
      operationId: getMemberDashboard
      tags: [members]
      responses:
        "200":
          description: Member dashboard bundle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemberDashboard" }
        "401": { $ref: "#/components/responses/Error" }
  /me/account:
    get:
      operationId: getMemberAccount
      tags: [members]
      responses:
        "200":
          description: Member account
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemberAccount" }
  /me/payments:
    get:
      operationId: getMemberPayments
      tags: [members]
      responses:
        "200":
          description: Payment history
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Payment" }
  /payments/checkout:
    post:
      operationId: createCheckout
      tags: [members]
      responses:
        "200":
          description: Stripe Checkout session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckoutSession" }
        "400": { $ref: "#/components/responses/Error" }
  /menu:
    get:
      operationId: getMenu
      tags: [members]
      responses:
        "200":
          description: F&B menu
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MenuItem" }
  /events:
    get:
      operationId: listEvents
      tags: [members]
      responses:
        "200":
          description: Club events
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ClubEvent" }
    post:
      operationId: createEvent
      tags: [supervisor]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EventInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClubEvent" }
  /events/{id}/rsvp:
    post:
      operationId: rsvpEvent
      tags: [members]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RsvpInput" }
      responses:
        "200":
          description: RSVP recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /tee-times:
    get:
      operationId: listTeeTimes
      tags: [members]
      parameters:
        - name: open
          in: query
          required: false
          schema: { type: boolean }
          description: When true, return only open (bookable) slots
      responses:
        "200":
          description: Tee times
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TeeTime" }
    post:
      operationId: bookTeeTime
      tags: [members]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TeeTimeInput" }
      responses:
        "201":
          description: Booked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeeTime" }
  /me/tee-times:
    get:
      operationId: getMyTeeTimes
      tags: [members]
      responses:
        "200":
          description: My tee times
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TeeTime" }
  /tee-times/{id}:
    delete:
      operationId: cancelTeeTime
      tags: [members]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Cancelled }
  /orders:
    get:
      operationId: listOrders
      tags: [fnb]
      parameters:
        - name: status
          in: query
          required: false
          schema: { $ref: "#/components/schemas/OrderStatus" }
      responses:
        "200":
          description: Orders (F&B service board)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Order" }
    post:
      operationId: createOrder
      tags: [members]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrderInput" }
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
  /me/orders:
    get:
      operationId: getMyOrders
      tags: [members]
      responses:
        "200":
          description: My orders
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Order" }
  /orders/{id}/status:
    patch:
      operationId: advanceOrderStatus
      tags: [fnb]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrderStatusInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }

  # ---- Employees portal -----------------------------------------------------
  /me/messages:
    get:
      operationId: getMyMessages
      tags: [employees]
      responses:
        "200":
          description: My staff messages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StaffMessageItem" }
  /me/messages/{id}/read:
    patch:
      operationId: markMessageRead
      tags: [employees]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /me/presence:
    patch:
      operationId: updatePresence
      tags: [employees]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PresenceInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /me/handoff:
    get:
      operationId: getMyHandoff
      tags: [employees]
      responses:
        "200":
          description: Summary of AI agent coverage while staff were away
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Handoff" }
  /me/shifts:
    get:
      operationId: getMyShifts
      tags: [employees]
      responses:
        "200":
          description: My shifts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Shift" }
  /shifts/{id}/clock-in:
    post:
      operationId: clockIn
      tags: [employees]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Clocked in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shift" }
  /shifts/{id}/clock-out:
    post:
      operationId: clockOut
      tags: [employees]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Clocked out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shift" }
  /me/tasks:
    get:
      operationId: getMyTasks
      tags: [employees]
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Task" }
  /tasks:
    get:
      operationId: listTasks
      tags: [supervisor]
      responses:
        "200":
          description: All team tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Task" }
    post:
      operationId: createTask
      tags: [supervisor]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [employees]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
  /me/time-off:
    get:
      operationId: getMyTimeOff
      tags: [employees]
      responses:
        "200":
          description: Time-off requests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TimeOff" }
  /time-off:
    post:
      operationId: requestTimeOff
      tags: [employees]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TimeOffInput" }
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimeOff" }
  /time-off/{id}:
    patch:
      operationId: decideTimeOff
      tags: [supervisor]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TimeOffDecision" }
      responses:
        "200":
          description: Decided
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimeOff" }
  /team:
    get:
      operationId: getTeam
      tags: [employees]
      responses:
        "200":
          description: Team roster
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TeamMember" }

  # ---- Supervisor portal ----------------------------------------------------
  /overview:
    get:
      operationId: getOverview
      tags: [supervisor]
      responses:
        "200":
          description: Supervisor overview metrics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Overview" }
  /course/rounds:
    get:
      operationId: getCourseRounds
      tags: [supervisor]
      responses:
        "200":
          description: Live on-course rounds
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CourseRound" }
  /requests:
    get:
      operationId: listRequests
      tags: [supervisor]
      responses:
        "200":
          description: Open member requests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MemberRequest" }
  /requests/{id}/resolve:
    patch:
      operationId: resolveRequest
      tags: [supervisor]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /staff:
    get:
      operationId: listStaff
      tags: [supervisor]
      responses:
        "200":
          description: Staff roster
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TeamMember" }
    post:
      operationId: createStaff
      tags: [supervisor]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateStaffInput" }
      responses:
        "201":
          description: Staff member created + invited
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteResult" }
        "400": { $ref: "#/components/responses/Error" }
  /members:
    get:
      operationId: listClubMembers
      tags: [supervisor]
      responses:
        "200":
          description: Club member roster
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ClubMember" }
    post:
      operationId: createMember
      tags: [supervisor]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMemberInput" }
      responses:
        "201":
          description: Member created + invited
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteResult" }
        "400": { $ref: "#/components/responses/Error" }
  /staff/{id}/message:
    post:
      operationId: messageStaff
      tags: [supervisor]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StaffMessageBody" }
      responses:
        "200":
          description: Message result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResult" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /leads:
    get:
      operationId: listLeads
      tags: [supervisor]
      responses:
        "200":
          description: Sales leads
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Lead" }
  /leads/{id}:
    patch:
      operationId: updateLead
      tags: [supervisor]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeadUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Lead" }
  /bookings:
    get:
      operationId: listBookings
      tags: [supervisor]
      responses:
        "200":
          description: Tee sheet (all bookings today)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Booking" }
  /bookings/{id}:
    patch:
      operationId: updateBooking
      tags: [supervisor]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BookingUpdate" }
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Booking" }
        "404": { $ref: "#/components/responses/Error" }
  /announcements:
    get:
      operationId: listAnnouncements
      tags: [members]
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Announcement" }
    post:
      operationId: createAnnouncement
      tags: [supervisor]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnnouncementInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Announcement" }

  # ---- Department channels (chat) -------------------------------------------
  /channels:
    get:
      operationId: listChannels
      tags: [members]
      responses:
        "200":
          description: Department channels visible to the user
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Channel" }
  /channels/{id}/messages:
    get:
      operationId: getChannelMessages
      tags: [members]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Channel message history
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChatMessage" }
    post:
      operationId: sendChannelMessage
      tags: [members]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChannelMessageInput" }
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatMessage" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  # ---- Escalations ----------------------------------------------------------
  /escalations:
    get:
      operationId: listEscalations
      tags: [supervisor]
      responses:
        "200":
          description: Open escalations for the club
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Escalation" }
  /escalations/{id}/resolve:
    patch:
      operationId: resolveEscalation
      tags: [supervisor]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
        "404": { $ref: "#/components/responses/Error" }

  # ---- Supervisor delegation ------------------------------------------------
  /agents/delegation:
    get:
      operationId: getDelegation
      tags: [supervisor]
      responses:
        "200":
          description: Current delegation state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Delegation" }
  /agents/delegate:
    post:
      operationId: startDelegation
      tags: [supervisor]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DelegateInput" }
      responses:
        "200":
          description: Delegation started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Delegation" }
  /agents/delegation/end:
    post:
      operationId: endDelegation
      tags: [supervisor]
      responses:
        "200":
          description: Delegation ended
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }

  # ---- Messaging analytics --------------------------------------------------
  /analytics/messaging:
    get:
      operationId: getMessagingAnalytics
      tags: [supervisor]
      responses:
        "200":
          description: Messaging & AI agent metrics (last 7 days)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessagingAnalytics" }

  # ---- Agentic concierge ----------------------------------------------------
  /agent/chat:
    post:
      operationId: agentChat
      tags: [agent]
      summary: Send a message to the AI concierge
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentChatInput" }
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentChatReply" }

components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: string }

  responses:
    Error:
      description: Error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }

  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    Ok:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]
    Channel:
      type: object
      properties:
        id: { type: string }
        key: { type: string }
        name: { type: string }
        description: { type: string }
        emoji: { type: string }
        color: { type: string }
        department: { type: string }
        visibleToMembers: { type: boolean }
      required: [id, key, name]
    ChatMessage:
      type: object
      properties:
        id: { type: string }
        channelId: { type: string }
        senderUserId: { type: string }
        senderName: { type: string }
        senderRole: { type: string }
        aiGenerated: { type: boolean }
        content: { type: string }
        time: { type: string }
        createdAt: { type: string }
      required: [id, channelId, senderName, content, createdAt]
    ChannelMessageInput:
      type: object
      properties:
        content: { type: string, minLength: 1 }
      required: [content]
    Escalation:
      type: object
      properties:
        id: { type: string }
        channelId: { type: string }
        memberName: { type: string }
        level: { type: number }
        triggerType: { type: string }
        contextSummary: { type: string }
        agentLastMessage: { type: string }
        status: { type: string }
        time: { type: string }
      required: [id, memberName, level, status]
    PresenceInput:
      type: object
      properties:
        status:
          type: string
          enum: [available, busy, away, offline, dnd]
      required: [status]
    Delegation:
      type: object
      properties:
        active: { type: boolean }
        autonomy: { type: string }
        by: { type: string }
        until: { type: string }
        startedAt: { type: string }
      required: [active]
    DelegateInput:
      type: object
      properties:
        autonomy:
          type: string
          enum: [low, medium, high, full]
        durationMinutes: { type: number }
      required: [autonomy, durationMinutes]
    CreateStaffInput:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [employee, supervisor] }
        jobTitle: { type: string }
