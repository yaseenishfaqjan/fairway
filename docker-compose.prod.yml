# Fairway360 — production stack for a VPS.
#   db    : PostgreSQL with a persistent volume
#   app   : the single-service Fairway360 image (API + built SPA on :5000)
#   caddy : reverse proxy with automatic HTTPS (Let's Encrypt) for your domain
#
# Usage:
#   cp .env.prod.example .env   # then fill in DOMAIN, DB_PASSWORD, SESSION_SECRET, keys
#   docker compose -f docker-compose.prod.yml up -d --build
# See DEPLOY.md for the full runbook.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: fairway
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: fairway360
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairway -d fairway360"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./fairway360
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_URL: postgres://fairway:${DB_PASSWORD}@db:5432/fairway360
      SESSION_SECRET: ${SESSION_SECRET}
      # Optional integrations — leave blank to run with graceful fallbacks.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CONCIERGE_MODEL: ${CONCIERGE_MODEL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SALES_NOTIFY_EMAIL: ${SALES_NOTIFY_EMAIL:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    expose:
      - "5000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
